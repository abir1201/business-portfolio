<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Panel — Portfolio</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/admin.css">
</head>
<body>

  <!-- ============================================================
       LOGIN SCREEN
       ============================================================ -->
  <div id="login-screen">
    <div class="login-box">
      <div class="login-logo">
        <div class="logo-text">Port<span class="accent">folio</span></div>
        <p>Admin Control Panel</p>
      </div>
      <h2 class="login-title">Welcome Back</h2>
      <p class="login-sub">Sign in to manage your portfolio</p>
      <div class="login-error" id="login-error">Invalid credentials. Please try again.</div>
      <form id="login-form">
        <div class="adm-form-group">
          <label>Username</label>
          <input id="login-user" type="text" value="admin" placeholder="admin" autocomplete="username" required>
        </div>
        <div class="adm-form-group">
          <label>Password</label>
          <input id="login-pass" type="password" placeholder="Enter your password" autocomplete="current-password" required>
        </div>
        <button type="submit" class="adm-btn adm-btn-primary" style="width:100%;justify-content:center;padding:.85rem">
          Sign In
        </button>
      </form>
    
      <div style="text-align:center;margin-top:1.25rem">
        <a href="index.html" style="font-size:.8rem;color:var(--text3);transition:var(--t)"
           onmouseover="this.style.color='var(--primary-l)'"
           onmouseout="this.style.color='var(--text3)'">
          ← Back to Portfolio
        </a>
      </div>
    </div>
  </div>

  <!-- ============================================================
       ADMIN APP
       ============================================================ -->
  <div id="admin-app">

    <!-- Sidebar -->
    <aside class="adm-sidebar" id="adm-sidebar">
      <div class="sidebar-header">
        <div class="sidebar-logo">Port<span class="accent">folio</span> <span style="font-size:.7rem;color:var(--text3);font-weight:400">Admin</span></div>
        <button id="sidebar-close" aria-label="Close sidebar">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>
      </div>

      <nav class="sidebar-nav">
        <div class="sidebar-section">Overview</div>
        <button class="sidebar-item active" data-tab="dashboard">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
          Dashboard
        </button>

        <div class="sidebar-section">Profile</div>
        <button class="sidebar-item" data-tab="profile">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
          My Profile
        </button>
        <button class="sidebar-item" data-tab="education">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 10v6M2 10l10-5 10 5-10 5z"/><path d="M6 12v5c3 3 9 3 12 0v-5"/></svg>
          Education
        </button>
        <button class="sidebar-item" data-tab="skills">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>
          Skills & Tech
        </button>
        <button class="sidebar-item" data-tab="experience">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="3" width="20" height="14" rx="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/></svg>
          Experience &amp; Awards
        </button>

        <div class="sidebar-section">Content</div>
        <button class="sidebar-item" data-tab="projects">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="16 18 22 12 16 6"/><polyline points="8 6 2 12 8 18"/></svg>
          Projects
        </button>
        <button class="sidebar-item" data-tab="business">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
          Business
        </button>
        <button class="sidebar-item" data-tab="gallery">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
          Gallery
        </button>

        <div class="sidebar-section">Communication</div>
        <button class="sidebar-item" data-tab="messages">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
          Messages
          <span class="sidebar-badge" style="display:none">0</span>
        </button>
        <button class="sidebar-item" data-tab="social">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/></svg>
          Social Media
        </button>

        <div class="sidebar-section">System</div>
        <button class="sidebar-item" data-tab="settings">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.07 4.93a10 10 0 00-14.14 0m14.14 14.14a10 10 0 01-14.14 0M4.93 4.93a10 10 0 000 14.14m14.14-14.14a10 10 0 010 14.14"/></svg>
          Settings
        </button>
      </nav>

      <div class="sidebar-footer">
        <div class="sidebar-user">
          <div class="sidebar-avatar">A</div>
          <div>
            <div class="sidebar-username">Admin</div>
            <span class="sidebar-role">Portfolio Owner</span>
          </div>
        </div>
        <button class="sidebar-logout" id="logout-btn">Sign Out</button>
      </div>
    </aside>

    <!-- Main Content Area -->
    <main class="adm-main">
      <!-- Topbar -->
      <div class="adm-topbar">
        <div style="display:flex;align-items:center;gap:.75rem">
          <button id="mobile-menu-btn" aria-label="Open menu">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
          </button>
          <span class="adm-topbar-title" id="topbar-title">Dashboard</span>
        </div>
        <div class="adm-topbar-right">
          <a href="index.html" target="_blank" class="adm-view-btn">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 13v6a2 2 0 01-2 2H5a2 2 0 01-2-2V8a2 2 0 012-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>
            View Portfolio
          </a>
        </div>
      </div>

      <!-- Dynamic Content -->
      <div class="adm-content" id="adm-content">
        <!-- Tabs render here -->
      </div>
    </main>
  </div>

  <!-- Scripts -->
  <script src="js/data.js?v=4"></script>
  <script src="js/admin.js?v=4"></script>
</body>
</html>
